<div class="split-layout">
    <!-- Left Side: Form -->
    <div class="form-container relative-container">

        <!-- Local Theme Toggle -->
        <button class="theme-toggle-local" (click)="themeService.toggleTheme()"
            [attr.aria-label]="themeService.isDarkMode() ? 'Passer au mode clair' : 'Passer au mode sombre'">
            <i [class]="themeService.isDarkMode() ? 'ri-sun-line' : 'ri-moon-line'"></i>
        </button>

        <div class="auth-card">
            <div class="auth-header">
                <h2>Bienvenue</h2>
                <p>Connectez-vous à votre espace personnel de gestion de flotte</p>
            </div>

            <div *ngIf="errorMessage" class="error-alert">
                {{ errorMessage }}
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
                <div class="form-group">
                    <label for="email">Adresse e-mail</label>
                    <div class="input-wrapper">
                        <i class="icon-mail"></i>
                        <input type="email" id="email" formControlName="email" placeholder="exemple@email.com"
                            [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" />
                    </div>
                    <span class="error-text" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                        E-mail invalide.
                    </span>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="input-wrapper">
                        <i class="icon-lock"></i>
                        <input type="password" id="password" formControlName="password" placeholder="Votre mot de passe"
                            [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" />
                    </div>
                    <span class="error-text"
                        *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                        Le mot de passe est obligatoire.
                    </span>
                </div>

                <div class="forgot-password">
                    <a href="#">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="btn-primary" [disabled]="isLoading">
                    <span *ngIf="!isLoading">Se connecter</span>
                    <span *ngIf="isLoading" class="loader"></span>
                </button>

                <div class="auth-footer">
                    <p>Vous n'avez pas de compte ? <a routerLink="/auth/register-client">Devenir Client</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Right Side: Image Panel -->
    <div class="image-panel">
        <!-- Dark overlay for better text readability -->
        <div class="image-overlay"></div>
        <div class="branding">
            <i class="ri-truck-line"></i>
            <h1>FleetSync</h1>
            <p>La solution intelligente pour dynamiser votre logistique.</p>
        </div>
    </div>
</div>
